name: flutter_kore_template
description: "Template project for flutter_kore architecture"

publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: 3.44.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations: 
    sdk: flutter

  # place dependencies in alphabetical order

  cupertino_icons: ^1.0.9
  dart_mappable: ^4.8.0
  intl: ^0.20.2
  flutter_kore: ^1.5.1
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build: ^4.0.6
  build_config: ^1.3.0
  build_runner: ^2.15.0
  dart_mappable_builder: ^4.8.0
  flutter_lints: ^6.0.0

  flutter_kore_generator: ^2.4.0

flutter:
  generate: true
  
  # assets: 
    # - assets/images/
    # - assets/svg/
    # - assets/fonts/

  uses-material-design: true
