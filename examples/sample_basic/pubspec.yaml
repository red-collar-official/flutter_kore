name: sample_basic
description: Basic sample demonstating minimal setup for flutter_kore - here we are using only http and DI components.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: 3.41.7

dependencies:
  flutter:
    sdk: flutter

  dart_mappable: ^4.8.0
  dio: ^5.9.2
  flutter_kore: ^1.4.10
  shared_preferences: ^2.5.5

dev_dependencies:
  build: ^4.0.5
  build_config: ^1.3.0
  build_runner: ^2.14.1
  dart_mappable_builder: ^4.8.0
  flutter_kore_generator: ^2.4.0
  flutter_lints: ^6.0.0
  test:

flutter:
  uses-material-design: true